name: "Typhur Connect"
description: "Connects Typhur Sync Quad thermometer to Home Assistant via MQTT auto-discovery using your Typhur account credentials"
version: "1.4.4"
slug: "typhur_connect"
init: false
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
options:
  typhur_email: ""
  typhur_password: ""
  typhur_token: ""
  typhur_region: "eu"
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
schema:
  typhur_email: str?
  typhur_password: str?
  typhur_token: str?
  typhur_region: str
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str?
  mqtt_password: str?
